<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroZone — Tu Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="cart-main">
      <header class="cart-header text-center">
        <h1 class="cart-title">
          <img src="/src/assets/carritoRetro.png" alt="carrito" width="" class="cart-title-icon" />
          TU CARRITO
        </h1>
        <p class="cart-subtitle">Revisa tu selección antes de pagar</p>
      </header>

      <!-- Estado: carrito con productos -->
      <section id="cartContenido" class="px-3 px-md-4 pb-5 d-none">
        <div class="row g-4">

          <!-- Lista de productos -->
          <div class="col-12 col-lg-8">
            <div class="cart-items-header d-none d-md-flex">
              <span class="col-producto">PRODUCTO</span>
              <span class="col-precio">PRECIO</span>
              <span class="col-cantidad">CANTIDAD</span>
              <span class="col-subtotal">SUBTOTAL</span>
              <span class="col-quitar"></span>
            </div>
            <div id="listaItems"></div>

            <button id="btnVaciar" class="btn-vaciar mt-3">
              <i class="bi bi-trash3"></i> VACIAR CARRITO
            </button>
            <a href="/src/pages/catalog/catalog.html" class="btn-seguir mt-3">
              <i class="bi bi-arrow-left"></i> SEGUIR COMPRANDO
            </a>
          </div>

          <!-- Resumen del pedido -->
          <div class="col-12 col-lg-4">
            <aside class="cart-resumen">
              <h2 class="resumen-titulo">RESUMEN</h2>

              <div class="resumen-linea">
                <span>Productos (<span id="resumenCount">0</span>)</span>
                <span id="resumenSubtotal">$0</span>
              </div>
              <div class="resumen-linea resumen-ahorro">
                <span>Descuentos</span>
                <span id="resumenAhorro">-$0</span>
              </div>
              <div class="resumen-linea resumen-envio">
                <span>Envío</span>
                <span class="envio-gratis">GRATIS</span>
              </div>

              <div class="resumen-divider"></div>

              <div class="resumen-linea resumen-total">
                <span>TOTAL</span>
                <span id="resumenTotal">$0</span>
              </div>

              <button id="btnPagar" class="btn-pagar">
                PROCEDER AL PAGO
              </button>
              <p class="resumen-nota">
                <i class="bi bi-shield-lock"></i> Pago seguro · Productos retro garantizados
              </p>
            </aside>
          </div>

        </div>
      </section>

      <!-- Estado: carrito vacío -->
      <section id="cartVacio" class="cart-vacio text-center d-none">
        <img
          src="/src/assets/alien-cart.png"
          alt="Alien retro"
          class="cart-vacio-alien"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"
        />
        <div class="cart-vacio-icon-fallback" style="display:none">👾</div>
        <p class="cart-vacio-texto">TU CARRITO ESTÁ VACÍO</p>
        <p class="cart-vacio-sub">¡Aún no hay aventuras en tu mochila!</p>
        <a href="/src/pages/catalog/catalog.html" class="btn-explorar">
          EXPLORAR CATÁLOGO
        </a>
      </section>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/components/navbar/NavBar-vite.js"></script>
    <script type="module" src="/src/components/footer/Footer.js"></script>
    <script type="module" src="cart.js"></script>
  </body>
</html>
