<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroZone — Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="catalog.css" />
  </head>
  <body>
  
    <div id="navbar"></div>
    <main class="catalog-main">

      <!-- Encabezado -->
      <header class="catalog-header text-center">
        <h1 class="catalog-title">CATÁLOGO</h1>
        <p class="catalog-subtitle">Encuentra tu próxima aventura retro</p>
      </header>

      <!-- Barra de filtros -->
      <section class="catalog-filters container-fluid px-4">
        <div class="row g-3 align-items-end">

          <!-- Búsqueda -->
          <div class="col-12 col-md-4">
            <label class="filter-label" for="busqueda">BUSCAR</label>
            <div class="input-group">
              <input
                type="text"
                id="busqueda"
                class="form-control filter-input"
                placeholder="Nombre del juego..."
              />
              <button class="btn btn-filter-search" type="button" id="btnBuscar">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </div>

          <!-- Consola -->
          <div class="col-6 col-md-2">
            <label class="filter-label" for="filtroPlatforma">Consolas</label>
            <select id="filtroPlatforma" class="form-select filter-select">
              <option value="">Todas</option>
              <option value="GameBoy">GameBoy</option>
              <option value="GameBoy Color">GameBoy Color</option>
              <option value="GameBoy Advance">GameBoy Advance</option>
              <option value="NES">NES</option>
              <option value="SNES">SNES</option>
              <option value="Nintendo 64">Nintendo 64</option>
            </select>
          </div>

          <!-- Categoría -->
          <div class="col-6 col-md-2">
            <label class="filter-label" for="filtroCategoria">Género</label>
            <select id="filtroCategoria" class="form-select filter-select">
              <option value="">Todas</option>
              <option value="Plataformas">Plataformas</option>
              <option value="Aventura">Aventura</option>
              <option value="RPG">RPG</option>
              <option value="Acción">Acción</option>
              <option value="Peleas">Peleas</option>
              <option value="Shooter">Shooter</option>
              <option value="Puzle">Puzle</option>
              <option value="Carreras">Carreras</option>
              <option value="Metroidvania">Metroidvania</option>
            </select>
          </div>

          <!-- Estado -->
          <div class="col-6 col-md-2">
            <label class="filter-label" for="filtroEstado">Estado</label>
            <select id="filtroEstado" class="form-select filter-select">
              <option value="">Todos</option>
              <option value="Nuevo">Nuevo</option>
              <option value="Semi-nuevo">Semi-nuevo</option>
              <option value="Buen estado">Buen estado</option>
              <option value="Aceptable">Aceptable</option>
              <option value="Desgastado">Desgastado</option>
            </select>
          </div>

          <!-- Ordenar -->
          <div class="col-6 col-md-2">
            <label class="filter-label" for="filtroOrden">Ordenar</label>
            <select id="filtroOrden" class="form-select filter-select">
              <option value="">Relevancia</option>
              <option value="precio-asc">Precio: menor a mayor</option>
              <option value="precio-desc">Precio: mayor a menor</option>
              <option value="descuento">Mayor descuento</option>
              <option value="nombre">Nombre A-Z</option>
            </select>
          </div>

        </div>

        <!-- Contador de resultados -->
        <div class="row mt-3 align-items-center">
          <div class="col">
            <div id="filtrosActivos" class="d-flex flex-wrap gap-2"></div>
          </div>
          <div class="col-auto">
            <span class="resultado-contador" id="contadorResultados"></span>
          </div>
        </div>
      </section>

      <!-- Grid de productos -->
      <section class="px-4 mt-4 pb-5">
        <div class="row g-4" id="gridProductos"></div>

        <!-- Sin resultados -->
        <div id="sinResultados" class="sin-resultados d-none text-center py-5">
          <div class="sin-resultados-icon">👾</div>
          <p class="sin-resultados-texto">NO SE ENCONTRARON JUEGOS</p>
          <button class="btn boton-pixel mt-3" id="btnLimpiarFiltros">LIMPIAR FILTROS</button>
        </div>
      </section>

    </main>

    <div id="footer-container"></div>

    <script type="module" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/components/navbar/NavBar-vite.js"></script>
    <script type="module" src="/src/components/footer/Footer.js"></script>
    <script type="module" src="catalog.js"></script>
  </body>
</html>
