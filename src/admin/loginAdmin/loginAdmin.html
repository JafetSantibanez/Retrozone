<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RZ - Inicio Sesión Admin</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="loginAdmin.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container-fluid min-vh-100 d-flex align-items-center p-0">
      <!--Revisa este id cuando hagas el Js-->
      <form
        id="adminForm"
        method="POST"
        class="mx-auto px-4"
        style="max-width: 750px"
        novalidate
      >
        <header class="text-center mb-4">
          <h1 class="display-6 fw-bold" style="color: #c21a4b">
            Inicio de sesión Administrador
          </h1>
        </header>

        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label for="email" class="form-label">Correo electrónico</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="Ej. retro@zone.com"
              required
            />
          </div>

          <div class="col-12 col-md-6">
            <label for="password" class="form-label">Contraseña</label>
            <div class="password-container">
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                required
              />
              <i
                class="bi bi-eye-slash password-toggle-icon"
                id="togglePassword"
              ></i>
            </div>
          </div>

          <div id="loginErrorGlobal" class="col-12 text-center my-2 d-none">
            <span class="fw-bold" style="color: #dc3545; font-size: 0.65rem">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>El correo
              electrónico o la contraseña son incorrectos.
            </span>
          </div>

          <div class="col-12 text-center mt-4">
            <button
              type="submit"
              class="btn btn-retro text-white w-100 py-2 fw-bold"
              style="background-color: #c21a4b; border-radius: 20px"
            >
              Ingresar
            </button>
          </div>
        </div>
      </form>
    </main>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/components/navbar/NavBar-vite.js"></script>
    <script type="module" src="/src/components/footer/Footer.js"></script>
  </body>
</html>
