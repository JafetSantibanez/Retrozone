<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="./contact.css">
    <link rel="stylesheet" href="../../style.css">


</head>
<body>
    <div id="navbar"></div>
    <a href="../../../index.html"></a>
    
    <section class="contactanos-container">
        <h2 class="contact-title">Contactanos</h2>
        <div class="form-floating mb-3">
  <input type="text" class="form-control" id="floatingInput" placeholder="exampleName">
  <label for="floatingInput">Nombre</label>
</div>
<div class="form-floating mb-3">
  <input type="text" class="form-control" id="floatingEmail" placeholder="name@example.com">
  <label for="floatingInput">Correo Electronico</label>
</div>
<div class="form-floating mb-3">
  <input type="password" class="form-control" id="floatingMessage" placeholder="ReasonMessage">
  <label for="floatingPassword">Motivo de mensaje</label>
</div>
<div class="form-floating mb-3">
  <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2" style="height: 100px" maxlength="1000"></textarea>
  <label for="floatingTextarea2">Dejanos tu mensaje</label>
</div>
  <div class="d-grid gap-2">
  <button class="btn btn-primary" type="button">Enviar</button>
</div>


    </section>

    <div id="footer-container"></div>
    <script type="module" src="../../components/navbar/NavBar.js"></script>
    <script type="module" src="../../components/footer/Footer.js"></script>
</body>
</html>
