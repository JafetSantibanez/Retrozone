<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetroZone - Iniciar sesión</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="login.css" rel="stylesheet" />
  </head>
  <body>
    <div id="navbar"></div>
    <main class="container-fluid min-vh-100 d-flex align-items-center p-0">
      <div class="w-100 py-5 retro-banner">
        <form
          id="loginForm"
          method="POST"
          class="mx-auto px-4"
          style="max-width: 750px"
          novalidate
        >
          <header class="text-center mb-4">
            <img
              src="../../../assets/register/LogoRetro.png"
              alt="Logo RetroZone"
              class="img-fluid mb-2"
            />
            <h1 class="display-6 fw-bold" style="color: #c21a4b">
              Iniciar Sesión
            </h1>
          </header>

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="email" class="form-label">Correo electrónico</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Ej. retro@zone.com"
                required
              />
            </div>

            <div class="col-12 col-md-6">
              <label for="password" class="form-label">Contraseña</label>
              <div class="password-container">
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  required
                />
                <i
                  class="bi bi-eye-slash password-toggle-icon"
                  id="togglePassword"
                ></i>
              </div>
            </div>

            <div class="col-12 d-flex flex-column align-items-center">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="rememberMe"
                  name="rememberMe"
                />
                <label class="form-check-label" for="rememberMe"
                  >Recordarme</label
                >
              </div>
            </div>

            <div id="loginErrorGlobal" class="col-12 text-center my-2 d-none">
              <span class="fw-bold" style="color: #dc3545; font-size: 0.65rem">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>El correo
                electrónico o la contraseña son incorrectos.
              </span>
            </div>

            <div class="col-12 text-center mt-4">
              <button
                type="submit"
                class="btn btn-retro text-white w-100 py-2 fw-bold"
                style="background-color: #c21a4b; border-radius: 20px"
              >
                Ingresar
              </button>
              <p class="mt-3">
                ¿Olvidaste tu contraseña?
                <a
                  href="/src/pages/auth/forgot-password/forgot-password.html"
                  class="text-success text-decoration-none fw-bold"
                  >Click aquí</a
                >
              </p>
              <p class="mt-3">
                ¿Aún no tienes una cuenta con nosotros?
                <a
                  href="/src/pages/auth/register/register.html"
                  class="text-success text-decoration-none fw-bold"
                  >Click aquí</a
                >
              </p>
            </div>
          </div>
        </form>
      </div>
    </main>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/components/navbar/NavBar-vite.js"></script>
    <script type="module" src="/src/components/footer/Footer.js"></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
