<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Normaliza estilos entre navegadores -->
		<link rel="stylesheet" href="./src/style.css" />

		<link rel="stylesheet" href="./src/pages/home/home.css" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link
			href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
			rel="stylesheet" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Press+Start+2P&display=swap"
			rel="stylesheet" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
		<link rel="stylesheet" href="./src/styles/global.css" />
		<link rel="stylesheet" href="./src/styles/normalize.css" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

		<title>Retrozone</title>
	</head>

	<body>
		<div id="navbar"></div>
		<section class="hero-retro">
			<div class="stars"></div>
			<div class="twinkle star1"></div>
			<div class="twinkle star2"></div>

			<div class="twinkle star3"></div>
			<div class="twinkle star4"></div>
			<div class="shooting-star"></div>
			<div class="infinity-star"></div>
			<img src="./src/assets/cloud3.png" class="cloud cloud1" alt="Nube" />
			<img src="./src/assets/cloud3.png" class="cloud cloud2" alt="Nube" />
			<img src="./src/assets/cloud3.png" class="cloud cloud3" alt="Nube" />

			<div class="hero-content">
				<div class="retrozone-logo">
					<img
						src="./src/assets/logoRetro.jpeg"
						class="logoRe"
						alt="Logo Retrozone" />
					<h1 class="tiPri">ETROZONE</h1>
				</div>
				<div>
					<img src="./src/assets/moneda.png" alt="moneda" class="moneda" />
					<h2 class="insertCoin">- Insert coin -</h2>
				</div>

				<p class="subtitulo">REVIVE LA NOSTALGIA</p>
			</div>
			<img src="./src/assets/pasto.png" class="pasto" alt="Pasto" />
		</section>
		<section class="categoria-container">
			<h2 class="titulo-categoria">- CATEGORIAS -</h2>
			<section class="categoria">
				<div class="card" style="width: 10rem">
					<img
						src="./src/assets/nintendoNes.png"
						class="card-img-top"
						alt="..." />
					<div class="card-body">
						<p class="card-text">Consolas.</p>
					</div>
				</div>

				<div class="card" style="width: 10rem">
					<img src="./src/assets/signo.png" class="card-img-top" alt="..." />
					<div class="card-body">
						<p class="card-text">Juegos</p>
					</div>
				</div>
				<div class="card" style="width: 10rem">
					<img src="./src/assets/control.png" class="card-img-top" alt="..." />
					<div class="card-body">
						<p class="card-text">Accesorios</p>
					</div>
				</div>
				<div class="card" style="width: 10rem">
					<img src="./src/assets/luigui.png" class="card-img-top" alt="..." />
					<div class="card-body">
						<p class="card-text">Coleccionables</p>
					</div>
				</div>
				<div class="card" style="width: 10rem">
					<img src="./src/assets/palanca.png" class="card-img-top" alt="..." />
					<div class="card-body">
						<p class="card-text">Atari</p>
					</div>
				</div>

				<div class="card" style="width: 10rem">
					<img src="./src/assets/gameboy.png" class="card-img-top" alt="..." />
					<div class="card-body">
						<p class="card-text">Game Boy</p>
					</div>
				</div>
			</section>
		</section>

		<div id="footer-container"></div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"></script>
		<script type="module" src="./src/components/navbar/NavBar-vite.js"></script>
		<script type="module" src="./src/components/footer/Footer.js"></script>
	</body>
</html>
